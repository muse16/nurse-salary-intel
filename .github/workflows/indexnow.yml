name: Ping IndexNow after deploy

on:
  push:
    branches:
      - main

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deployment
        run: sleep 90

      - name: Ping IndexNow with sitemap
        run: |
          curl -s "https://www.bing.com/indexnow?url=https://nursesalaryintel.com/sitemap.xml&key=36a2b6c3748d4a6ebcd1ff59a82d46f0"
          echo "IndexNow ping sent"
