<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 600px; height: 600px; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  .thumb {
    width: 600px;
    height: 600px;
    background: linear-gradient(145deg, #1e3a8a 0%, #2563eb 60%, #3b82f6 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 40px;
    text-align: center;
  }

  .bg-circle-1 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    top: -120px; right: -100px;
  }
  .bg-circle-2 {
    position: absolute;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    bottom: -80px; left: -60px;
  }

  .icon-wrap {
    width: 90px; height: 90px;
    background: #facc15;
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    margin-bottom: 24px;
    box-shadow: 0 8px 32px rgba(250,204,21,0.4);
    z-index: 1;
  }

  .badge {
    background: rgba(250,204,21,0.2);
    border: 1px solid rgba(250,204,21,0.5);
    color: #facc15;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 100px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
    z-index: 1;
  }

  h1 {
    font-size: 38px;
    font-weight: 900;
    color: white;
    line-height: 1.1;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
    z-index: 1;
  }
  h1 span { color: #facc15; }

  .sub {
    font-size: 15px;
    color: #bfdbfe;
    margin-bottom: 32px;
    line-height: 1.5;
    z-index: 1;
    max-width: 440px;
  }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 32px;
    z-index: 1;
  }
  .pill {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 100px;
  }

  .price-row {
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 1;
  }
  .price-box {
    background: #facc15;
    color: #1e1b4b;
    font-size: 32px;
    font-weight: 900;
    padding: 10px 28px;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(250,204,21,0.4);
  }
  .one-time {
    color: #93c5fd;
    font-size: 13px;
    font-weight: 600;
    text-align: left;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="thumb">
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>

  <div class="icon-wrap">📋</div>
  <div class="badge">Digital Download</div>
  <h1>Nurse Contract<br><span>Negotiation Kit</span></h1>
  <p class="sub">15-point audit checklist + negotiation scripts + legal templates for nurses</p>

  <div class="pills">
    <div class="pill">✓ Contract Checklist</div>
    <div class="pill">✓ Salary Scripts</div>
    <div class="pill">✓ Legal Templates</div>
    <div class="pill">✓ Market Data</div>
  </div>

  <div class="price-row">
    <div class="price-box">$27</div>
    <div class="one-time">One-time<br>payment</div>
  </div>
</div>
</body>
</html>
